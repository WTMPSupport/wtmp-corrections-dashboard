<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WTMP Curriculum Corrections</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --navy: #00225F;
      --teal: #00A6A6;
      --mint: #B8E4C2;
      --coral: #FF6B6B;
      --bg: #f7f9fc;
      --white: #ffffff;
      --text: #1f2937;
      --muted: #7a8494;
      --line: #dfe5ec;
      --header: #eef3f8;
      --shadow: 0 4px 14px rgba(0, 34, 95, 0.06);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Montserrat, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .hero {
      background: var(--navy);
      padding: 52px 20px 44px;
      text-align: center;
      color: white;
    }

    .logo {
      width: 220px;
      max-width: 80%;
      margin-bottom: 18px;
      filter: brightness(0) invert(1);
    }

    .hero h1 {
      font-family: Garamond, Georgia, serif;
      font-size: 2.7rem;
      line-height: 1.05;
      margin: 0;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 24px 36px;
    }

    .status {
      margin: 0 0 16px;
      font-size: 0.95rem;
      color: var(--muted);
      text-align: center;
    }

    .controls {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
      align-items: center;
    }

    input,
    select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      font-size: 14px;
      background: var(--white);
      color: var(--text);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(0, 166, 166, 0.12);
    }

    .table-shell {
      background: var(--white);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 14px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 1100px;
      border-collapse: separate;
      border-spacing: 0 12px;
      table-layout: fixed;
      background: transparent;
    }

    thead th {
      background: var(--header);
      color: #4b5563;
      text-align: left;
      padding: 13px 14px;
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    thead th:first-child {
      border-top-left-radius: 10px;
      border-bottom-left-radius: 10px;
    }

    thead th:last-child {
      border-top-right-radius: 10px;
      border-bottom-right-radius: 10px;
    }

    tbody tr {
      background: var(--white);
      box-shadow: 0 2px 8px rgba(0, 34, 95, 0.05);
    }

    td {
      padding: 16px 14px;
      font-size: 0.95rem;
      line-height: 1.45;
      vertical-align: top;
      white-space: normal;
      word-wrap: break-word;
      overflow-wrap: break-word;
      border-top: 1px solid #eef2f6;
      border-bottom: 1px solid #eef2f6;
    }

    td:first-child {
      border-left: 1px solid #eef2f6;
      border-top-left-radius: 12px;
      border-bottom-left-radius: 12px;
      font-weight: 700;
    }

    td:last-child {
      border-right: 1px solid #eef2f6;
      border-top-right-radius: 12px;
      border-bottom-right-radius: 12px;
    }

    tbody tr:hover td {
      background: #fbfcfe;
    }

    th:nth-child(1), td:nth-child(1) { width: 16%; } /* Series */
    th:nth-child(2), td:nth-child(2) { width: 10%; } /* Volume */
    th:nth-child(3), td:nth-child(3) { width: 10%; } /* Edition */
    th:nth-child(4), td:nth-child(4) { width: 12%; } /* Component */
    th:nth-child(5), td:nth-child(5) { width: 6%; }  /* Page */
    th:nth-child(6), td:nth-child(6) { width: 14%; } /* Location */
    th:nth-child(7), td:nth-child(7) { width: 24%; } /* Issue */
    th:nth-child(8), td:nth-child(8) { width: 8%; }  /* File */

  .file-button {
  display: inline-block;
  background: var(--navy);
  color: white;
  text-decoration: none;
  font-size: 0.78rem; /* slightly smaller */
  font-weight: 700;
  padding: 8px 10px;
  border-radius: 10px;
  text-align: center;

  line-height: 1.2; /* tighter vertical spacing */
  white-space: normal; /* 🔥 allow wrapping */
}
    }

    .file-button:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    .empty-row td {
      text-align: center;
      color: var(--muted);
      font-style: normal;
      padding: 28px 18px;
    }

    @media (max-width: 900px) {
      .hero {
        padding: 42px 20px 36px;
      }

      .hero h1 {
        font-size: 2.25rem;
      }

      .logo {
        width: 180px;
      }

      .wrap {
        padding: 22px 16px 30px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .table-shell {
        padding: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="hero">
    <img src="WTMP_Logo_Master_Vector.svg" class="logo" alt="WTMP Logo">
    <h1>Curriculum Corrections</h1>
  </div>

  <div class="wrap">
    <div class="status" id="status">Loading corrections…</div>

    <div class="controls">
      <input id="search" placeholder="Search corrections...">
      <select id="series"></select>
      <select id="component"></select>
    </div>

    <div class="table-shell">
      <table>
        <thead>
          <tr>
            <th>Series</th>
            <th>Volume</th>
            <th>Edition</th>
            <th>Component</th>
            <th>Page</th>
            <th>Location</th>
            <th>Issue</th>
            <th>File</th>
          </tr>
        </thead>
        <tbody id="table"></tbody>
      </table>
    </div>
  </div>

  <script>
    const DATA_URL = "https://script.google.com/macros/s/AKfycbxobJV1XF6XAsi4lTsChj5L_KuvqH3Gzm1PqXxEas_TgR2CkClkeTYTzPDj-pGlhRQGQw/exec";

    let data = [];

    const table = document.getElementById("table");
    const search = document.getElementById("search");
    const seriesSelect = document.getElementById("series");
    const componentSelect = document.getElementById("component");
    const status = document.getElementById("status");

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function populateFilters() {
      const series = [...new Set(data.map(r => r.series).filter(Boolean))].sort();
      const components = [...new Set(data.map(r => r.component).filter(Boolean))].sort();

      seriesSelect.innerHTML =
        "<option value=''>All Series</option>" +
        series.map(s => `<option>${escapeHtml(s)}</option>`).join("");

      componentSelect.innerHTML =
        "<option value=''>All Components</option>" +
        components.map(c => `<option>${escapeHtml(c)}</option>`).join("");
    }

    function render() {
      const term = search.value.toLowerCase().trim();
      const seriesVal = seriesSelect.value;
      const compVal = componentSelect.value;

      table.innerHTML = "";

      const filtered = data.filter(r =>
        (!seriesVal || r.series === seriesVal) &&
        (!compVal || r.component === compVal) &&
        JSON.stringify(r).toLowerCase().includes(term)
      );

      if (!filtered.length) {
        table.innerHTML = `
          <tr class="empty-row">
            <td colspan="8">No results found.</td>
          </tr>
        `;
        return;
      }

      filtered.forEach(r => {
const fileCell = r.fileUrl
  ? `<a class="file-button" href="${escapeHtml(r.fileUrl)}" target="_blank" rel="noopener noreferrer">Corrected<br>File</a>`
  : `<span class="muted">—</span>`;

        const row = `
          <tr>
            <td>${escapeHtml(r.series)}</td>
            <td>${escapeHtml(r.volume)}</td>
            <td>${escapeHtml(r.edition)}</td>
            <td>${escapeHtml(r.component)}</td>
            <td>${escapeHtml(r.page)}</td>
            <td>${escapeHtml(r.location)}</td>
            <td>${escapeHtml(r.issue)}</td>
            <td>${fileCell}</td>
          </tr>
        `;

        table.innerHTML += row;
      });
    }

    async function loadData() {
      try {
        const res = await fetch(DATA_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        data = await res.json();
        status.textContent = `${data.length} correction${data.length === 1 ? "" : "s"} loaded`;

        populateFilters();
        render();
      } catch (err) {
        console.error(err);
        status.textContent = "Unable to load corrections right now.";
        table.innerHTML = `
          <tr class="empty-row">
            <td colspan="8">Could not load corrections.</td>
          </tr>
        `;
      }
    }

    search.addEventListener("input", render);
    seriesSelect.addEventListener("change", render);
    componentSelect.addEventListener("change", render);

    loadData();
  </script>
</body>
</html>
