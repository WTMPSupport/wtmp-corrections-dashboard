<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WTMP Curriculum Corrections</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --navy: #00225F;
      --bg: #f7f9fc;
      --white: #ffffff;
      --text: #1f2937;
      --muted: #7a8494;
      --line: #dfe5ec;
      --header: #eef3f8;
      --shadow: 0 4px 14px rgba(0, 34, 95, 0.06);
    }

    body {
      margin: 0;
      font-family: Montserrat, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* 🔥 FIXED HERO */
    .hero {
      background: var(--navy);
      padding: 28px 20px 22px; /* reduced height */
      text-align: center;
      color: white;
    }

    /* 🔥 CRITICAL FIX: contain SVG */
    .logo {
      width: 160px;
      max-width: 90%;
      height: auto;
      margin-bottom: 10px;
      filter: brightness(0) invert(1);
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .hero h1 {
      font-family: Garamond, Georgia, serif;
      font-size: 2.2rem;
      margin: 6px 0 0;
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }

    .status {
      text-align: center;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1.3fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    input, select {
      padding: 11px 13px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--white);
    }

    .table-shell {
      background: var(--white);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 12px;
      max-height: 70vh;
      overflow-y: auto;
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 1100px;
      border-collapse: separate;
      border-spacing: 0 10px;
      table-layout: fixed;
    }

    thead th {
      background: var(--header);
      padding: 12px;
      font-size: 0.85rem;
      position: sticky;
      top: 0;
      z-index: 5;
    }

    tbody tr {
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    td {
      padding: 14px;
      vertical-align: top;
      border-top: 1px solid #eef2f6;
      border-bottom: 1px solid #eef2f6;
      word-wrap: break-word;
    }

    td:first-child {
      font-weight: bold;
      border-left: 1px solid #eef2f6;
      border-radius: 10px 0 0 10px;
    }

    td:last-child {
      border-right: 1px solid #eef2f6;
      border-radius: 0 10px 10px 0;
      text-align: center;
    }

    /* column widths */
    th:nth-child(1), td:nth-child(1) { width: 16%; }
    th:nth-child(2), td:nth-child(2) { width: 10%; }
    th:nth-child(3), td:nth-child(3) { width: 10%; }
    th:nth-child(4), td:nth-child(4) { width: 12%; }
    th:nth-child(5), td:nth-child(5) { width: 6%; }
    th:nth-child(6), td:nth-child(6) { width: 14%; }
    th:nth-child(7), td:nth-child(7) { width: 24%; }
    th:nth-child(8), td:nth-child(8) { width: 8%; }

    .file-button {
      background: var(--navy);
      color: white;
      font-size: 0.78rem;
      padding: 8px;
      border-radius: 10px;
      display: inline-block;
      text-decoration: none;
      line-height: 1.2;
      white-space: normal;
    }

    .empty-row td {
      text-align: center;
      color: var(--muted);
      padding: 24px;
    }

    @media (max-width: 900px) {
      .controls {
        grid-template-columns: 1fr;
      }
    }

  </style>
</head>

<body>

  <div class="hero">
    <img src="WTMP_Logo_Master_Vector.svg" class="logo">
    <h1>Curriculum Corrections</h1>
  </div>

  <div class="wrap">

    <div class="status" id="status">Loading corrections…</div>

    <div class="controls">
      <input id="search" placeholder="Search corrections...">
      <select id="series"></select>
      <select id="component"></select>
    </div>

    <div class="table-shell">
      <table>
        <thead>
          <tr>
            <th>Series</th>
            <th>Volume</th>
            <th>Edition</th>
            <th>Component</th>
            <th>Page</th>
            <th>Location</th>
            <th>Issue</th>
            <th>File</th>
          </tr>
        </thead>
        <tbody id="table"></tbody>
      </table>
    </div>

  </div>

  <script>
    const DATA_URL = "https://script.google.com/macros/s/AKfycbxobJV1XF6XAsi4lTsChj5L_KuvqH3Gzm1PqXxEas_TgR2CkClkeTYTzPDj-pGlhRQGQw/exec";

    let data = [];

    const table = document.getElementById("table");
    const search = document.getElementById("search");
    const seriesSelect = document.getElementById("series");
    const componentSelect = document.getElementById("component");
    const status = document.getElementById("status");

    function populateFilters() {
      const series = [...new Set(data.map(r => r.series).filter(Boolean))].sort();
      const components = [...new Set(data.map(r => r.component).filter(Boolean))].sort();

      seriesSelect.innerHTML =
        "<option value=''>All Series</option>" +
        series.map(s => `<option>${s}</option>`).join("");

      componentSelect.innerHTML =
        "<option value=''>All Components</option>" +
        components.map(c => `<option>${c}</option>`).join("");
    }

    function render() {
      const term = search.value.toLowerCase();
      const seriesVal = seriesSelect.value;
      const compVal = componentSelect.value;

      table.innerHTML = "";

      const filtered = data.filter(r =>
        (!seriesVal || r.series === seriesVal) &&
        (!compVal || r.component === compVal) &&
        JSON.stringify(r).toLowerCase().includes(term)
      );

      if (!filtered.length) {
        table.innerHTML = "<tr class='empty-row'><td colspan='8'>No results found.</td></tr>";
        return;
      }

      filtered.forEach(r => {
        const fileCell = r.fileUrl
          ? `<a class="file-button" href="${r.fileUrl}" target="_blank">Corrected<br>File</a>`
          : "—";

        table.innerHTML += `
          <tr>
            <td>${r.series}</td>
            <td>${r.volume}</td>
            <td>${r.edition}</td>
            <td>${r.component}</td>
            <td>${r.page}</td>
            <td>${r.location}</td>
            <td>${r.issue}</td>
            <td>${fileCell}</td>
          </tr>
        `;
      });
    }

    async function loadData() {
      try {
        const res = await fetch(DATA_URL);
        data = await res.json();
        status.textContent = data.length + " corrections loaded";

        populateFilters();
        render();
      } catch {
        status.textContent = "Error loading data";
      }
    }

    search.addEventListener("input", render);
    seriesSelect.addEventListener("change", render);
    componentSelect.addEventListener("change", render);

    loadData();
  </script>

</body>
</html>
