<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WTMP Corrections Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --navy: #00225F;
      --teal: #00A6A6;
      --mint: #B8E4C2;
      --coral: #FF6B6B;
      --cream: #F8F5EC;
    }

    body {
      margin: 0;
      font-family: Montserrat, Arial, sans-serif;
      background: var(--cream);
      color: #1f2937;
    }

    /* HERO */
    .hero {
      background: var(--navy);
      padding: 60px 20px;
      text-align: center;
      color: white;
    }

    .logo {
      width: 220px;
      max-width: 80%;
      margin-bottom: 20px;
      filter: brightness(0) invert(1);
    }

    .hero h1 {
      font-family: Garamond, serif;
      font-size: 2.8rem;
      margin: 0;
    }

    /* LAYOUT */
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px;
    }

    /* CONTROLS */
    .controls {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    input, select {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
      background: white;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--teal);
    }

    /* STATUS */
    .status {
      margin-bottom: 16px;
      font-size: 14px;
      color: #555;
    }

    /* TABLE */
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: #f3f4f6;
      text-align: left;
      padding: 12px;
      font-size: 0.85rem;
      color: #555;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      font-size: 0.95rem;
      vertical-align: top;
    }

    tr:hover {
      background: #f9fafb;
    }

    a.file-link {
      color: var(--navy);
      font-weight: 600;
      text-decoration: none;
    }

    a.file-link:hover {
      text-decoration: underline;
    }

    .muted {
      color: #888;
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <img src="WTMP_Logo_Master_Vector.svg" class="logo" alt="WTMP Logo">
    <h1>Corrections Dashboard</h1>
  </div>

  <div class="wrap">

    <div class="status" id="status">Loading corrections…</div>

    <!-- FILTERS -->
    <div class="controls">
      <input id="search" placeholder="Search corrections...">
      <select id="series"></select>
      <select id="component"></select>
    </div>

    <!-- TABLE -->
    <table>
      <thead>
        <tr>
          <th>Series</th>
          <th>Volume</th>
          <th>Edition</th>
          <th>Component</th>
          <th>Page</th>
          <th>Location</th>
          <th>Issue</th>
          <th>File</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>

  </div>

  <script>
    // 🔥 PASTE YOUR APPS SCRIPT URL HERE
    const DATA_URL = "https://script.google.com/macros/s/AKfycbxobJV1XF6XAsi4lTsChj5L_KuvqH3Gzm1PqXxEas_TgR2CkClkeTYTzPDj-pGlhRQGQw/exec";

    let data = [];

    const table = document.getElementById("table");
    const search = document.getElementById("search");
    const seriesSelect = document.getElementById("series");
    const componentSelect = document.getElementById("component");
    const status = document.getElementById("status");

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function populateFilters() {
      const series = [...new Set(data.map(r => r.series).filter(Boolean))].sort();
      const components = [...new Set(data.map(r => r.component).filter(Boolean))].sort();

      seriesSelect.innerHTML =
        "<option value=''>All Series</option>" +
        series.map(s => `<option>${escapeHtml(s)}</option>`).join("");

      componentSelect.innerHTML =
        "<option value=''>All Components</option>" +
        components.map(c => `<option>${escapeHtml(c)}</option>`).join("");
    }

    function render() {
      const term = search.value.toLowerCase();
      const seriesVal = seriesSelect.value;
      const compVal = componentSelect.value;

      table.innerHTML = "";

      const filtered = data.filter(r =>
        (!seriesVal || r.series === seriesVal) &&
        (!compVal || r.component === compVal) &&
        JSON.stringify(r).toLowerCase().includes(term)
      );

      if (!filtered.length) {
        table.innerHTML = "<tr><td colspan='8' class='muted'>No results found</td></tr>";
        return;
      }

      filtered.forEach(r => {
        const fileCell = r.fileUrl
          ? `<a class="file-link" href="${r.fileUrl}" target="_blank">${escapeHtml(r.fileText || "Open")}</a>`
          : (r.fileText ? escapeHtml(r.fileText) : "-");

        const row = `
          <tr>
            <td>${escapeHtml(r.series)}</td>
            <td>${escapeHtml(r.volume)}</td>
            <td>${escapeHtml(r.edition)}</td>
            <td>${escapeHtml(r.component)}</td>
            <td>${escapeHtml(r.page)}</td>
            <td>${escapeHtml(r.location)}</td>
            <td>${escapeHtml(r.issue)}</td>
            <td>${fileCell}</td>
          </tr>
        `;

        table.innerHTML += row;
      });
    }

    async function loadData() {
      try {
        const res = await fetch(DATA_URL);
        data = await res.json();

        status.textContent = `${data.length} corrections loaded`;

        populateFilters();
        render();
      } catch (err) {
        console.error(err);
        status.textContent = "Error loading data";
      }
    }

    search.addEventListener("input", render);
    seriesSelect.addEventListener("change", render);
    componentSelect.addEventListener("change", render);

    loadData();
  </script>

</body>
</html>
